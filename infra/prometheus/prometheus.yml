global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8000"]

  - job_name: registry
    metrics_path: /metrics
    static_configs:
      - targets: ["registry:8001"]

  - job_name: otel_collector
    metrics_path: /metrics
    static_configs:
      - targets: ["otel-collector:8888"]
